name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Prevent parallel releases from racing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Unified build: CLI binary + Node addon + Python wheel ───────────
  # One job per target so each OS/arch compiles Rust only once.

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            python_interpreter: -i python3.8 -i python3.9 -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            python_interpreter: -i python3.8 -i python3.9 -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            python_interpreter: --find-interpreter
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            python_interpreter: --find-interpreter
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            python_interpreter: --find-interpreter

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Install cross tools on the host but do NOT write CC/linker vars
      # to $GITHUB_ENV — they would leak into the maturin Docker
      # container where aarch64-linux-gnu-gcc does not exist.
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── CLI binary ──────────────────────────────────────────────────

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p clawgrep
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../clawgrep-${{ github.ref_name }}-${{ matrix.target }}.tar.gz clawgrep
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/clawgrep.exe" -DestinationPath "clawgrep-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: clawgrep-${{ github.ref_name }}-${{ matrix.target }}.*

      # ── Node.js native addon ───────────────────────────────────────

      - name: Install Node dependencies
        working-directory: bindings/node
        run: npm install

      - name: Build native addon
        working-directory: bindings/node
        run: npx napi build --platform --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Copy CLI binary for Node package
        shell: bash
        working-directory: bindings/node
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "../../target/${{ matrix.target }}/release/clawgrep.exe" "./clawgrep-${{ matrix.target }}.exe"
          else
            cp "../../target/${{ matrix.target }}/release/clawgrep" "./clawgrep-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            bindings/node/*.node
            bindings/node/clawgrep-${{ matrix.target }}
            bindings/node/clawgrep-${{ matrix.target }}.exe

      # ── Python wheel ───────────────────────────────────────────────
      # The maturin step does NOT receive CC_aarch64_unknown_linux_gnu
      # because we never wrote it to $GITHUB_ENV. The manylinux cross
      # Docker image has its own cross-compiler at its own path.

      - name: Build Python wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml ${{ matrix.python_interpreter }}
          manylinux: auto
          before-script-linux: |
            export PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
            export CFLAGS_aarch64_unknown_linux_gnu="-march=armv8-a -D__ARM_ARCH=8"
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}
          path: dist/*.whl

  # ── Publish to crates.io ────────────────────────────────────────────

  publish-cargo:
    name: Publish crates.io
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish -p clawgrep --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish npm packages ────────────────────────────────────────────

  publish-npm:
    name: Publish npm
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install

      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: bindings/node/artifacts
          merge-multiple: true

      - name: Move artifacts
        run: npx napi artifacts --dir artifacts

      - name: Copy CLI binaries into platform packages
        shell: bash
        run: |
          declare -A TARGET_MAP=(
            [x86_64-unknown-linux-gnu]=npm/linux-x64-gnu
            [aarch64-unknown-linux-gnu]=npm/linux-arm64-gnu
            [x86_64-pc-windows-msvc]=npm/win32-x64-msvc
            [x86_64-apple-darwin]=npm/darwin-x64
            [aarch64-apple-darwin]=npm/darwin-arm64
          )
          for target in "${!TARGET_MAP[@]}"; do
            pkg_dir="${TARGET_MAP[$target]}"
            if [ -d "$pkg_dir" ]; then
              if [ -f "artifacts/clawgrep-${target}.exe" ]; then
                cp "artifacts/clawgrep-${target}.exe" "$pkg_dir/clawgrep.exe"
              elif [ -f "artifacts/clawgrep-${target}" ]; then
                cp "artifacts/clawgrep-${target}" "$pkg_dir/clawgrep"
                chmod +x "$pkg_dir/clawgrep"
              fi
            fi
          done

      - name: Copy README into package directory
        run: cp ../../README.md ./README.md

      - name: Publish platform packages
        shell: bash
        run: |
          for pkg_dir in npm/*/; do
            if [ -f "$pkg_dir/package.json" ]; then
              echo "Publishing $pkg_dir..."
              cd "$pkg_dir"
              npm publish --access public || echo "Skipping $pkg_dir (may already exist)"
              cd ../..
            fi
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish main package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish Python wheels to PyPI ───────────────────────────────────

  publish-pypi:
    name: Publish PyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── GitHub Release ──────────────────────────────────────────────────
  # Depends on all publish jobs so no partial release is created.

  release:
    name: GitHub Release
    needs: [publish-cargo, publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: clawgrep-*
