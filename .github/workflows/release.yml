name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# Prevent parallel releases from racing.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Portable binaries ───────────────────────────────────────────────

  build-binaries:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p clawgrep

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../clawgrep-${{ github.ref_name }}-${{ matrix.target }}.tar.gz clawgrep
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/clawgrep.exe" -DestinationPath "clawgrep-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: clawgrep-${{ github.ref_name }}-${{ matrix.target }}.*

  # ── Node.js native addon (napi-rs) ──────────────────────────────────

  build-node:
    name: Node (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - uses: Swatinem/rust-cache@v2
        with:
          key: node-${{ matrix.target }}
          workspaces: "."

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }}

      - name: Build CLI binary
        run: cargo build --release --target ${{ matrix.target }} -p clawgrep
        working-directory: .

      - name: Copy CLI binary into node dir
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "../../target/${{ matrix.target }}/release/clawgrep.exe" "./clawgrep-${{ matrix.target }}.exe"
          else
            cp "../../target/${{ matrix.target }}/release/clawgrep" "./clawgrep-${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            bindings/node/*.node
            bindings/node/clawgrep-${{ matrix.target }}
            bindings/node/clawgrep-${{ matrix.target }}.exe

  # ── Python wheels (maturin + PyO3) ──────────────────────────────────

  build-python:
    name: Python (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            interpreter: -i python3.8 -i python3.9 -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            interpreter: -i python3.8 -i python3.9 -i python3.10 -i python3.11 -i python3.12 -i python3.13 -i python3.14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            interpreter: --find-interpreter
          - target: x86_64-apple-darwin
            os: macos-latest
            interpreter: --find-interpreter
          - target: aarch64-apple-darwin
            os: macos-latest
            interpreter: --find-interpreter

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3

      - uses: Swatinem/rust-cache@v2
        with:
          key: python-${{ matrix.target }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m bindings/python/Cargo.toml ${{ matrix.interpreter }}
          manylinux: auto
          before-script-linux: |
            export PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
            export CFLAGS_aarch64_unknown_linux_gnu="-march=armv8-a -D__ARM_ARCH=8"
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target }}
          path: dist/*.whl

  # ── Publish to crates.io ────────────────────────────────────────────

  publish-cargo:
    name: Publish crates.io
    needs: [build-binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish -p clawgrep --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish npm packages ────────────────────────────────────────────

  publish-npm:
    name: Publish npm
    needs: [build-node]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install

      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          path: bindings/node/artifacts
          merge-multiple: true

      - name: Move artifacts
        run: npx napi artifacts --dir artifacts

      - name: Copy CLI binaries into platform packages
        shell: bash
        run: |
          declare -A TARGET_MAP=(
            [x86_64-unknown-linux-gnu]=npm/linux-x64-gnu
            [aarch64-unknown-linux-gnu]=npm/linux-arm64-gnu
            [x86_64-pc-windows-msvc]=npm/win32-x64-msvc
            [x86_64-apple-darwin]=npm/darwin-x64
            [aarch64-apple-darwin]=npm/darwin-arm64
          )
          for target in "${!TARGET_MAP[@]}"; do
            pkg_dir="${TARGET_MAP[$target]}"
            if [ -d "$pkg_dir" ]; then
              if [ -f "artifacts/clawgrep-${target}.exe" ]; then
                cp "artifacts/clawgrep-${target}.exe" "$pkg_dir/clawgrep.exe"
              elif [ -f "artifacts/clawgrep-${target}" ]; then
                cp "artifacts/clawgrep-${target}" "$pkg_dir/clawgrep"
                chmod +x "$pkg_dir/clawgrep"
              fi
            fi
          done

      - name: Publish
        run: |
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish Python wheels to PyPI ───────────────────────────────────

  publish-pypi:
    name: Publish PyPI
    needs: [build-python]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── GitHub Release ──────────────────────────────────────────────────

  release:
    name: GitHub Release
    needs: [build-binaries, build-node, build-python]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: clawgrep-*
