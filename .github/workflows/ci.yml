name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict default permissions — grant only what each job needs.
permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR to save resources.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  version-check:
    name: Version sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Check all package versions match
        shell: bash
        run: |
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          NODE_VER=$(grep '"version"' bindings/node/package.json | head -1 | sed 's/.*"\([0-9][^"]*\)".*/\1/')
          PY_VER=$(grep '^version' bindings/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "Cargo.toml:    $CARGO_VER"
          echo "package.json:  $NODE_VER"
          echo "pyproject.toml: $PY_VER"
          if [ "$CARGO_VER" != "$NODE_VER" ] || [ "$CARGO_VER" != "$PY_VER" ]; then
            echo "::error::Version mismatch! All packages must have the same version."
            exit 1
          fi

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all
